<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Zen - Coğrafya Hafıza Merkezi</title>
    <style>
        :root {
            --bg-cream: #fcfbf9;
            --sage-green: #9fb5a3;
            --butter-yellow: #fceea7;
            --light-blue: #b8d8e0;
            --champagne-gold: #c8b382;
            --text-dark: #333333;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .portal-card {
            background-color: var(--white);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid #eaeaea;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--champagne-gold);
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #777777;
            font-size: 14px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            background-color: var(--white);
            border: 1px solid var(--champagne-gold);
            color: var(--text-dark);
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
        }

        .menu-btn:hover {
            background-color: var(--champagne-gold);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(200, 179, 130, 0.3);
            transform: translateY(-2px);
        }

        .menu-btn.rivers {
            border-color: var(--sage-green);
        }

        .menu-btn.rivers:hover {
            background-color: var(--sage-green);
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <h1>CORE ZEN</h1>
        <p>KPSS COĞRAFYA HAFIZA MERKEZİ</p>
        
        <div class="menu-list">
            <!-- Dağlar kodunu daglar.html olarak kaydettiğinden emin ol -->
            <a href="daglar.html" class="menu-btn">Türkiye'nin Dağları</a>
            
            <!-- Akarsular kodunu akarsular.html olarak kaydettin -->
            <a href="akarsular.html" class="menu-btn rivers">Türkiye'nin Akarsuları</a>

            <a href="platolar.html" class="menu-btn">Türkiye'nin Platoları</a>

            <a href="ovalar.html" class="menu-btn">Türkiye'nin Ovaları</a>

            <a href="kiyitipleri.html" class="menu-btn">Türkiye'nin Kıyı Tipleri</a>

            <a href="buzuldaglari.html" class="menu-btn">Buzul Şekillerine Rastlanan Dağlar</a>

            <a href="goller.html" class="menu-btn">Türkiye'nin Gölleri</a>

            <a href="topraklar.html" class="menu-btn">Türkiye'nin Toprakları</a>

            <a href="bitkiler.html" class="menu-btn">Türkiye'nin Bitkileri</a>
        </div>
    </div>

</body>
</html>
