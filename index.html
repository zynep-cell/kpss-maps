<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Zen - Coğrafya Hafıza Merkezi</title>
    <style>
        :root {
            --bg-cream: #fcfbf9;
            --sage-green: #9fb5a3;
            --butter-yellow: #fceea7;
            --light-blue: #b8d8e0;
            --pastel-pink: #f4d1d9;
            --champagne-gold: #c8b382;
            --text-dark: #333333;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--champagne-gold);
            margin-bottom: 30px;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        button {
            background-color: var(--white);
            border: 1px solid var(--champagne-gold);
            color: var(--text-dark);
            padding: 12px 30px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        button.active {
            background-color: var(--champagne-gold);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(200, 179, 130, 0.3);
        }

        button:hover:not(.active) {
            background-color: var(--bg-cream);
        }

        .status-bar {
            height: 40px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }

        .map-container {
            position: relative;
            max-width: 1100px;
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            background-color: var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        #map-image {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        #markers-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .mountain-marker {
            position: absolute;
            background-color: rgba(200, 179, 130, 0.5);
            border: 1px solid var(--champagne-gold);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mountain-marker:hover {
            background-color: var(--butter-yellow);
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 10;
        }

        .tooltip {
            position: absolute;
            background-color: var(--white);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 3px solid var(--sage-green);
            z-index: 20;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h1>TÜRKİYE'NİN DAĞLARI</h1>

    <div class="controls">
        <button id="btn-learn" class="active" onclick="setMode('learn')">Öğrenme Modu</button>
        <button id="btn-test" onclick="setMode('test')">Test Modu</button>
    </div>

    <div class="status-bar" id="status-bar">
        Harita üzerinde gezinerek dağları öğrenebilirsin.
    </div>

    <div class="map-container" id="map-container">
        <img id="map-image" src="daglar_dolu.png.jpeg" alt="Türkiye Dağlar Haritası">
        <div id="markers-layer"></div>
        <div id="tooltip" class="tooltip"></div>
    </div>

    <script>
        const mountains = [
            // Kırık Dağlar
            { name: "Kaz Dağları", x: 9.0, y: 33.0 },
            { name: "Madra Dağı", x: 9.5, y: 39.0 },
            { name: "Yunt Dağı", x: 10.0, y: 45.0 },
            { name: "Bozdağlar", x: 12.0, y: 52.0 },
            { name: "Aydın Dağları", x: 13.0, y: 56.5 },
            { name: "Menteşe Dağları", x: 17.0, y: 62.0 },
            { name: "Amanos (Nur) Dağları", x: 61.0, y: 78.0 },
            
            // Volkanik Dağlar
            { name: "Kula Volkanları", x: 21.0, y: 49.0 },
            { name: "Uludağ (İç Püskürük)", x: 24.0, y: 32.0 },
            { name: "Karadağ (İç Anadolu)", x: 43.0, y: 65.5 },
            { name: "Karacadağ (İç Anadolu)", x: 45.5, y: 62.0 },
            { name: "Hasan Dağı", x: 48.0, y: 56.5 },
            { name: "Melendiz Dağı", x: 51.0, y: 55.0 },
            { name: "Erciyes Dağı", x: 55.0, y: 50.0 },
            { name: "Karacadağ (Güneydoğu)", x: 73.0, y: 62.5 },
            { name: "Nemrut Dağı", x: 84.0, y: 53.0 },
            { name: "Süphan Dağı", x: 86.5, y: 48.0 },
            { name: "Tendürek Dağı", x: 91.0, y: 43.5 },
            { name: "Ağrı Dağı", x: 94.0, y: 38.0 },

            // Kıvrım Dağlar
            { name: "Yıldız Dağları", x: 12.5, y: 17.0 },
            { name: "Samanlı Dağları", x: 24.0, y: 28.0 },
            { name: "Bolu Dağları", x: 32.0, y: 25.0 },
            { name: "Köroğlu Dağları", x: 36.0, y: 29.0 },
            { name: "Ilgaz Dağları", x: 42.0, y: 23.5 },
            { name: "Küre Dağları", x: 46.0, y: 19.5 },
            { name: "Canik Dağları", x: 57.0, y: 25.5 },
            { name: "Giresun Dağları", x: 68.0, y: 28.0 },
            { name: "Kaçkarlar", x: 79.0, y: 26.0 },
            { name: "Yalnızçam Dağları", x: 87.5, y: 21.0 },
            { name: "Allahuekber Dağları", x: 90.5, y: 26.5 },
            { name: "Mescit Dağı", x: 83.5, y: 31.0 },
            { name: "Mercan Dağları", x: 71.0, y: 42.0 },
            { name: "Bey Dağları", x: 27.5, y: 66.0 },
            { name: "Dedegöl Dağları", x: 32.5, y: 58.5 },
            { name: "Sultan Dağları", x: 34.0, y: 53.0 },
            { name: "Geyik Dağları", x: 37.0, y: 64.0 },
            { name: "Bolkar Dağları", x: 47.0, y: 66.5 },
            { name: "Aladağlar", x: 52.5, y: 60.5 },
            { name: "Tahtalı Dağları", x: 58.0, y: 52.5 },
            { name: "Güneydoğu Toroslar", x: 73.0, y: 54.0 }
        ];

        let currentMode = 'learn';
        let currentTestMountain = null;

        const mapImage = document.getElementById('map-image');
        const markersLayer = document.getElementById('markers-layer');
        const tooltip = document.getElementById('tooltip');
        const statusBar = document.getElementById('status-bar');

        function initMap() {
            markersLayer.innerHTML = '';
            
            mountains.forEach(mountain => {
                const marker = document.createElement('div');
                marker.className = 'mountain-marker';
                marker.style.left = mountain.x + '%';
                marker.style.top = mountain.y + '%';
                
                if (currentMode === 'learn') {
                    marker.style.width = '16px';
                    marker.style.height = '16px';
                    marker.style.opacity = '1';

                    marker.addEventListener('mouseenter', () => {
                        tooltip.textContent = mountain.name;
                        tooltip.style.left = (mountain.x + 1.5) + '%';
                        tooltip.style.top = (mountain.y - 1.5) + '%';
                        tooltip.style.opacity = '1';
                    });

                    marker.addEventListener('mouseleave', () => {
                        tooltip.style.opacity = '0';
                    });
                } else {
                    marker.style.width = '30px';
                    marker.style.height = '30px';
                    marker.style.opacity = '0'; 

                    marker.addEventListener('click', () => {
                        checkAnswer(mountain.name, marker);
                    });
                }

                markersLayer.appendChild(marker);
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-learn').classList.remove('active');
            document.getElementById('btn-test').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');
            tooltip.style.opacity = '0';

            if (mode === 'learn') {
                mapImage.src = 'daglar_dolu.png.jpeg';
                statusBar.textContent = "Harita üzerinde gezinerek dağları öğrenebilirsin.";
                statusBar.style.color = "var(--text-dark)";
            } else {
                mapImage.src = 'daglar_bos.png.jpeg';
                startTest();
            }
            initMap();
        }

        function startTest() {
            const randomIndex = Math.floor(Math.random() * mountains.length);
            currentTestMountain = mountains[randomIndex].name;
            statusBar.innerHTML = `Hedef: <strong style="color: var(--champagne-gold); font-size: 22px; margin: 0 8px;">${currentTestMountain}</strong> nerede?`;
            statusBar.style.color = "var(--text-dark)";
        }

        function checkAnswer(clickedMountain, marker) {
            if (clickedMountain === currentTestMountain) {
                statusBar.textContent = `Doğru! Orası ${currentTestMountain}.`;
                statusBar.style.color = "var(--sage-green)";
                marker.style.opacity = '1';
                marker.style.backgroundColor = "var(--sage-green)";
                marker.style.borderColor = "var(--sage-green)";
                
                setTimeout(() => {
                    marker.style.opacity = '0';
                    startTest();
                }, 1500);
            } else {
                statusBar.textContent = `Yanlış yer. Orası ${clickedMountain}. Tekrar dene!`;
                statusBar.style.color = "var(--pastel-pink)";
            }
        }

        initMap();
    </script>
</body>
</html>
